<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens in some sandboxed environments when libraries try to patch fetch.
      (function() {
        try {
          const originalFetch = window.fetch;
          if (originalFetch && !Object.getOwnPropertyDescriptor(window, 'fetch')?.set) {
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function() { /* Ignore attempts to overwrite fetch */ },
              configurable: true
            });
          }
        } catch (e) {
          // If we can't even define it, it's already locked, which is fine as long as no one tries to set it.
          // But if they DO try to set it, it will still throw unless we can intercept it here.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
